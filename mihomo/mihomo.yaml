dns:
  enable: true
  cache-algorithm: arc
  listen: 0.0.0.0:1053
  ipv6: true
  respect-rules: false
  enhanced-mode: redir-host
  prefer-h3: true
  use-hosts: true
  use-system-hosts: true
  default-nameserver: ['223.5.5.5','223.6.6.6']
  proxy-server-nameserver: [*cn1,*cn2]
#  direct-nameserver: [system] #,*cn1,*cn2]
#  direct-nameserver-follow-policy: true
