# 全局配置 
mixed-port: 26250
ipv6: true
allow-lan: true
bind-address: '*'
mode: rule
log-level: error
unified-delay: true
tcp-concurrent: true
find-process-mode: off
# global-client-fingerprint: chrome
# client-fingerprint: chrome
disable-keep-alive: false
keep-alive-interval: 30
keep-alive-idle: 600
etag-support: true
authentication: ['canary:canary02625']
skip-auth-prefixes: ['127.0.0.1/8','::1/128','192.168.8.128/25','192.168.9.0/24','192.168.100.0/24']
global-ua: mihomo

# 入站代理
# listeners:
# - name: mixed-in
#   type: mixed
#   port: 1080
#   listen: 0.0.0.0
#   udp: true
#  proxy: 默认代理

# 面板
external-controller: 0.0.0.0:9090
# select: '密码'
external-ui: ui
external-ui-url: 'https://gh-proxy.com/github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip'
external-ui-name: z
profile: { store-selected: true, store-fake-ip: true }
# experimental: { quic-go-disable-gso: true, quic-go-disable-ecn: false, dialer-ip4p-convert: false }

# geo下载链接 
geox-url:
  geosite: https://gh-proxy.com/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat
  mmdb: https://gh-proxy.com/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country-lite.mmdb
  geoip: https://gh-proxy.com/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip-lite.dat
  asn: https://gh-proxy.com/https://github.com/xishang0128/geoip/releases/download/latest/GeoLite2-ASN.mmdb
# geo-auto-update: true
# geo-update-interval: 96

# dns
hosts:
  dns.alidns.com: [223.5.5.5,223.6.6.6]# ,'2400:3200::1','2400:3200:baba::1']
  doh.pub: [120.53.53.53,1.12.12.21]
  dns.google: [8.8.8.8,8.8.4.4] # ,'2001:4860:4860::8888','2001:4860:4860::8844']
  dns.quad9.net: [9.9.9.9,149.112.112.112] #,'2620:fe::fe','2620:fe::9']
  cloudflare-dns.com: [1.1.1.1,1.0.0.1]
  services.googleapis.cn: services.googleapis.com

direct-dns: &direct-dns ['system','https://dns.alidns.com/dns-query#直接','https://doh.pub/dns-query#直接&h3=false']
proxy-dns: &proxy-dns ['https://dns.google/dns-query#GDNS&disable-ipv6=true','https://dns.quad9.net/dns-query#GDNS&disable-ipv6=true']

dns:
  enable: true
  cache-algorithm: arc
  listen: 0.0.0.0:1053
  ipv6: true
  respect-rules: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.0/16
  fake-ip-range6: fd99:abcd:ef00::1/64
#   fake-ip-filter-mode: blacklist
#   fake-ip-filter: ['RULE-SET:direct_domain,alibaba_domain,private_domain,steamcn_domain,epic_domain,gamecn_domain,oppo_domain,fakeipfilter_domain,cn_domain']
  fake-ip-filter-mode: rule
  fake-ip-filter:
#     - OR,((RULE-SET,direct_domain),(RULE-SET,alibaba_domain),(RULE-SET,private_domain),(RULE-SET,steamcn_domain),(RULE-SET,epic_domain),(RULE-SET,gamecn_domain),(RULE-SET,oppo_domain),(RULE-SET,fakeipfilter_domain)(RULE-SET,cn_domain)),real-ip
    - RULE-SET,direct_domain,real-ip
    - RULE-SET,proxy_domain,fake-ip
    - RULE-SET,alibaba_domain,real-ip
    - RULE-SET,private_domain,real-ip
    - RULE-SET,steamcn_domain,real-ip
    - RULE-SET,epic_domain,real-ip
    - RULE-SET,gamecn_domain,real-ip
    - RULE-SET,oppo_domain,real-ip
    - RULE-SET,fakeipfilter_domain,real-ip
    - RULE-SET,cn_domain,real-ip
    - MATCH,fake-ip
  prefer-h3: true
  use-hosts: true
  use-system-hosts: true
  default-nameserver: ['223.5.5.5','223.6.6.6']
  proxy-server-nameserver: *direct-dns
  nameserver: *proxy-dns
  direct-nameserver: [system]
  direct-nameserver-follow-policy: true
  nameserver-policy:
    "rule-set:private_domain": [system]
    "rule-set:direct_domain": [system]
    "rule-set:proxy_domain": *proxy-dns
#    "rule-set:awavenue-ads-rule,category-ads-all": [rcode://success]
    "rule-set:alibaba_domain,private_domain,steamcn_domain,epic_domain,gamecn_domain,oppo_domain,cn_domain": [system]

# 嗅探
sniffer:
  enable: false
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: true
  sniff:
    HTTP: { ports: [80,8080-8880,2052,2082,2086,2095], override-destination: true }
    TLS: { ports: [443,8443,2053,2083,2087,2096], override-destination: true }
    QUIC: { ports: [443,8443,2053,2083,2087,2096], override-destination: true }
  skip-domain:
    - "rule-set:direct_domain,private_domain,steamcn_domain,epic_domain,gamecn_domain,oppo_domain,alibaba_domain,cn_domain,fakeipfilter_domain"
  force-domain:
    - "rule-set:netflix_domain,youtube_domain"
  skip-dst-address:
    - "rule-set:private_ip,telegram_ip,direct_ip,google_ip,cn_ip"

# 规则匹配
rules:
  - OR,((RULE-SET,direct_domain),(RULE-SET,direct_ip,no-resolve)),DIRECT_RULE
  - OR,((RULE-SET,proxy_domain),(RULE-SET,proxy_ip,no-resolve)),GDNS
#  - OR,((RULE-SET,webrtc_domain),(DST-PORT,3478),(DST-PORT,5349),(DST-PORT,5350),(DST-PORT,19302)),WEBRTC
#  - OR,((RULE-SET,awavenue-ads-rule),(RULE-SET,category-ads-all)),ADS
  - OR,((RULE-SET,private_ip,no-resolve),(RULE-SET,private_domain),(RULE-SET,tailscale_domain),(RULE-SET,ntpcn_domain),(RULE-SET,aliasn_ip,no-resolve),(RULE-SET,alibaba_domain),(RULE-SET,oppo_domain)),直连
#  - AND,((DST-PORT,443),(NETWORK,UDP),(NOT,((OR,((RULE-SET,cn_domain),(RULE-SET,cn_ip,no-resolve)))))),国外QUIC
  - AND,((DST-PORT,443),(NETWORK,UDP)),国外QUIC   # 绕过大陆后使用
  - RULE-SET,ai,AI
  - RULE-SET,github_domain,GitHub
  - RULE-SET,youtube_domain,YouTube
  - OR,((RULE-SET,google_domain),(RULE-SET,google_ip,no-resolve)),Google
  - RULE-SET,bing_domain,Bing
  - RULE-SET,onedrive_domain,OneDrive
  - RULE-SET,microsoft_domain,Microsoft
  - RULE-SET,tiktok_domain,TikTok
  - RULE-SET,instagram_domain,Instagram
  - RULE-SET,x_domain,X
  - OR,((RULE-SET,telegram_domain),(RULE-SET,telegram_ip,no-resolve)),Telegram
  - OR,((RULE-SET,netflix_domain),(RULE-SET,netflix_ip,no-resolve)),NETFLIX
  - RULE-SET,paypal_domain,PayPal
  - OR,((RULE-SET,apple_ip,no-resolve),(RULE-SET,apple_domain)),直连
  - OR,((RULE-SET,steamcn_domain),(RULE-SET,epic_domain),(RULE-SET,gamecn_domain)),GAME-CN
  - RULE-SET,geolocation-!cn,国外
  - OR,((RULE-SET,cn_domain),(RULE-SET,cn_ip)),直连
  - MATCH,漏网之鱼
   
